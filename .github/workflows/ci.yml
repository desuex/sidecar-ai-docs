name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all --all-features

      - name: CLI smoke test
        shell: bash
        run: ./scripts/ci/smoke.sh

  coverage:
    name: Coverage (Codecov)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage threshold check and lcov export
        shell: bash
        run: ./scripts/ci/coverage.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          fail_ci_if_error: true
          verbose: true

  docs:
    name: Docs (MkDocs strict)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Export sidecar docs for MkDocs
        shell: bash
        run: cargo run --quiet --bin sidecar -- export mkdocs --root . --out docs/generated

      - name: Verify exporter determinism
        shell: bash
        run: |
          first_generated_hash="$(find docs/generated -type f \( -name '*.md' -o -name '_manifest.json' \) | LC_ALL=C sort | xargs cat | sha256sum | cut -d' ' -f1)"
          cargo run --quiet --bin sidecar -- export mkdocs --root . --out docs/generated
          second_generated_hash="$(find docs/generated -type f \( -name '*.md' -o -name '_manifest.json' \) | LC_ALL=C sort | xargs cat | sha256sum | cut -d' ' -f1)"
          test "${first_generated_hash}" = "${second_generated_hash}"

      - name: Build docs
        run: mkdocs build --strict
